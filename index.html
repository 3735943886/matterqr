<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover so we can pad against the notch / home indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Matter QR Inventory</title>

  <!-- PWA / iOS home-screen install -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MatterQR" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon-180.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%94%B3%3C/text%3E%3C/svg%3E" />

  <!-- Apply theme before first paint to avoid a flash -->
  <script>
    (() => {
      const saved = localStorage.getItem("theme");
      const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (saved === null && sysDark)) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <!-- Vendored, offline-cached. Classic scripts run before the deferred module. -->
  <script src="./vendor/tailwind.js"></script>
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <script src="./vendor/pouchdb.js"></script>
  <script src="./vendor/jsQR.js"></script>
  <script src="./vendor/qrcode.js"></script>

  <style>
    html, body { height: 100%; }
    body {
      min-height: 100dvh;
      overscroll-behavior-y: none;
    }
    /* iOS Safari zooms the page when a focused field renders < 16px. Force 16px
       on small screens so tapping inputs never triggers an auto-zoom. */
    @media (max-width: 640px) {
      input, select, textarea { font-size: 16px !important; }
    }
    /* Disable double-tap-to-zoom (and the legacy 300ms tap delay) app-wide.
       touch-action restricts descendants by intersection, so setting it on the
       root covers every element while still allowing scroll and pinch-zoom. */
    html { touch-action: manipulation; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .safe-x { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    /* Modal bodies scroll internally without bouncing the page. */
    .modal-scroll { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
    /* Horizontal facet rows: scrollable, no visible scrollbar. */
    .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    /* Staggered fade-in for list cards — subtle, respects reduced-motion. */
    @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    /* Modal entrance: slide up as a bottom sheet on phones, fade+scale on wider screens. */
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes sheetIn { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: none; } }
    @keyframes panelIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: no-preference) {
      .card-in { animation: cardIn .28s cubic-bezier(.22,.61,.36,1) both; }
      .overlay-in { animation: overlayIn .2s ease both; }
      .sheet-in { animation: sheetIn .34s cubic-bezier(.22,.61,.36,1) both; }
      @media (min-width: 641px) { .sheet-in { animation: panelIn .22s cubic-bezier(.22,.61,.36,1) both; } }
    }
    [hidden] { display: none !important; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <!-- Header -->
  <header class="safe-top safe-x sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
    <div class="mx-auto flex max-w-3xl items-center gap-2 px-3 py-2">
      <h1 class="mr-auto flex items-center gap-2 text-base font-semibold">
        <span>🔳</span><span data-i18n="app.title">Matter QR Inventory</span>
      </h1>
      <span id="sync-badge" class="rounded-full px-2 py-0.5 text-xs font-medium"></span>
      <button id="btn-backup" class="rounded-lg p-2 text-lg hover:bg-slate-100 dark:hover:bg-slate-800" data-i18n-attr="title:action.backup" title="Backup">💾</button>
      <button id="btn-settings" class="rounded-lg p-2 text-lg hover:bg-slate-100 dark:hover:bg-slate-800" data-i18n-attr="title:action.settings" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- iOS install hint (shown only on iOS Safari, non-standalone) -->
  <div id="install-banner" hidden
       class="safe-x mx-auto flex max-w-3xl items-center gap-2 bg-sky-100 px-3 py-2 text-sm text-sky-900 dark:bg-sky-900/40 dark:text-sky-100">
    <span class="mr-auto" data-i18n="install.banner"></span>
    <button id="install-dismiss" class="rounded px-2 py-1 font-medium" data-i18n="install.dismiss"></button>
  </div>

  <!-- Filter bar -->
  <div class="safe-x sticky top-[49px] z-20 border-b border-slate-200/80 bg-slate-50/85 backdrop-blur-md dark:border-slate-800/80 dark:bg-slate-950/85">
    <div class="mx-auto max-w-3xl space-y-2.5 px-3 py-2.5">
      <div class="relative">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400">🔍</span>
        <input id="search" type="search" inputmode="search" autocapitalize="off" autocorrect="off"
               class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-9 pr-3 text-sm shadow-sm outline-none transition placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-700 dark:bg-slate-900"
               data-i18n-attr="placeholder:search.placeholder" />
      </div>
      <!-- Collapsed filter control — opens a bottom sheet with the facets. -->
      <div class="flex items-center gap-2">
        <button id="btn-filters"
                class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-600 shadow-sm transition hover:border-slate-300 active:scale-95 dark:border-slate-700 dark:bg-slate-800/60 dark:text-slate-300">
          <svg viewBox="0 0 20 20" class="h-3.5 w-3.5" fill="currentColor" aria-hidden="true"><path d="M2.5 4.5A1 1 0 0 1 3.5 3.5h13a1 1 0 0 1 .8 1.6l-5.3 6.9V16a1 1 0 0 1-.55.9l-2.4 1.2A1 1 0 0 1 7.2 17v-5l-5.3-6.9a1 1 0 0 1-.4-.6z"/></svg>
          <span data-i18n="filter.button">Filters</span>
          <span id="filter-count" hidden class="ml-0.5 inline-flex min-w-[1.1rem] justify-center rounded-full bg-emerald-600 px-1.5 py-0.5 text-[10px] font-bold text-white"></span>
        </button>
        <button id="btn-filters-clear" hidden data-i18n="filter.clear"
                class="rounded-full px-2.5 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">Clear</button>
        <button id="btn-sort"
                class="ml-auto inline-flex shrink-0 items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-600 shadow-sm transition hover:border-slate-300 active:scale-95 dark:border-slate-700 dark:bg-slate-800/60 dark:text-slate-300">
          <svg viewBox="0 0 20 20" class="h-3.5 w-3.5" fill="currentColor" aria-hidden="true"><path d="M6 3a1 1 0 0 1 .8.4l2 2.67a1 1 0 0 1-1.6 1.2L7 6.9V16a1 1 0 1 1-2 0V6.9l-.2.37a1 1 0 0 1-1.6-1.2l2-2.67A1 1 0 0 1 6 3zm8 14a1 1 0 0 1-.8-.4l-2-2.67a1 1 0 0 1 1.6-1.2l.2.37V4a1 1 0 1 1 2 0v9.1l.2-.37a1 1 0 0 1 1.6 1.2l-2 2.67a1 1 0 0 1-.8.4z"/></svg>
          <span id="sort-label"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Device list -->
  <main class="safe-x safe-bottom mx-auto max-w-3xl px-3 pb-28 pt-3">
    <div id="list-meta" class="mb-2.5 px-1 text-xs font-medium uppercase tracking-wide text-slate-400"></div>
    <div id="device-list" class="grid grid-cols-1 gap-2.5"></div>
    <div id="empty" hidden class="py-20 text-center text-sm text-slate-500"></div>
  </main>

  <!-- Floating scan button -->
  <button id="btn-scan"
          class="safe-bottom fixed bottom-5 left-1/2 z-30 flex -translate-x-1/2 items-center gap-2 rounded-full bg-emerald-600 px-7 py-3.5 text-base font-semibold text-white shadow-lg shadow-emerald-600/30 ring-1 ring-emerald-500/50 transition hover:bg-emerald-500 hover:shadow-xl hover:shadow-emerald-600/40 active:scale-95">
    <span class="text-lg">📷</span><span data-i18n="action.scan">Scan</span>
  </button>

  <!-- Toast + modal roots -->
  <div id="toasts" class="pointer-events-none fixed inset-x-0 bottom-20 z-50 flex flex-col items-center gap-2 px-4"></div>
  <div id="modal-root" class="z-40"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>

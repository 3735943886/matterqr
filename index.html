<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover so we can pad against the notch / home indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Matter QR Inventory</title>

  <!-- PWA / iOS home-screen install -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MatterQR" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon-180.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%94%B3%3C/text%3E%3C/svg%3E" />

  <!-- Apply theme before first paint to avoid a flash -->
  <script>
    (() => {
      const saved = localStorage.getItem("theme");
      const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (saved === null && sysDark)) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <!-- Vendored, offline-cached. Classic scripts run before the deferred module. -->
  <script src="./vendor/tailwind.js"></script>
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <script src="./vendor/pouchdb.js"></script>
  <script src="./vendor/jsQR.js"></script>

  <style>
    html, body { height: 100%; }
    body {
      min-height: 100dvh;
      overscroll-behavior-y: none;
    }
    /* iOS Safari zooms the page when a focused field renders < 16px. Force 16px
       on small screens so tapping inputs never triggers an auto-zoom. */
    @media (max-width: 640px) {
      input, select, textarea { font-size: 16px !important; }
    }
    /* Remove the 300ms tap delay / double-tap zoom on controls. */
    button, a, input, select, label { touch-action: manipulation; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .safe-x { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    /* Modal bodies scroll internally without bouncing the page. */
    .modal-scroll { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
    [hidden] { display: none !important; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <!-- Header -->
  <header class="safe-top safe-x sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
    <div class="mx-auto flex max-w-3xl items-center gap-2 px-3 py-2">
      <h1 class="mr-auto flex items-center gap-2 text-base font-semibold">
        <span>🔳</span><span data-i18n="app.title">Matter QR Inventory</span>
      </h1>
      <span id="sync-badge" class="rounded-full px-2 py-0.5 text-xs font-medium"></span>
      <button id="btn-backup" class="rounded-lg p-2 text-lg hover:bg-slate-100 dark:hover:bg-slate-800" data-i18n-attr="title:action.backup" title="Backup">💾</button>
      <button id="btn-settings" class="rounded-lg p-2 text-lg hover:bg-slate-100 dark:hover:bg-slate-800" data-i18n-attr="title:action.settings" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- iOS install hint (shown only on iOS Safari, non-standalone) -->
  <div id="install-banner" hidden
       class="safe-x mx-auto flex max-w-3xl items-center gap-2 bg-sky-100 px-3 py-2 text-sm text-sky-900 dark:bg-sky-900/40 dark:text-sky-100">
    <span class="mr-auto" data-i18n="install.banner"></span>
    <button id="install-dismiss" class="rounded px-2 py-1 font-medium" data-i18n="install.dismiss"></button>
  </div>

  <!-- Filter bar -->
  <div class="safe-x sticky top-[49px] z-20 border-b border-slate-200 bg-slate-50/95 backdrop-blur dark:border-slate-800 dark:bg-slate-950/95">
    <div class="mx-auto max-w-3xl space-y-2 px-3 py-2">
      <input id="search" type="search" inputmode="search" autocapitalize="off" autocorrect="off"
             class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-900"
             data-i18n-attr="placeholder:search.placeholder" />
      <div id="filter-chips" class="flex flex-wrap gap-1.5"></div>
    </div>
  </div>

  <!-- Device list -->
  <main class="safe-x safe-bottom mx-auto max-w-3xl px-3 py-3">
    <div id="list-meta" class="mb-2 text-xs text-slate-500"></div>
    <div id="device-list" class="grid gap-2"></div>
    <div id="empty" hidden class="py-16 text-center text-sm text-slate-500"></div>
  </main>

  <!-- Floating scan button -->
  <button id="btn-scan"
          class="safe-bottom fixed bottom-4 left-1/2 z-30 flex -translate-x-1/2 items-center gap-2 rounded-full bg-emerald-600 px-6 py-3 text-base font-semibold text-white shadow-xl hover:bg-emerald-500 active:scale-95">
    <span>📷</span><span data-i18n="action.scan">Scan</span>
  </button>

  <!-- Toast + modal roots -->
  <div id="toasts" class="pointer-events-none fixed inset-x-0 bottom-20 z-50 flex flex-col items-center gap-2 px-4"></div>
  <div id="modal-root" class="z-40"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
